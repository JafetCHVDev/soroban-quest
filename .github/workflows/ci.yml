name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Eslint check
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script found, skipping linting check."
          fi

      - name: Check Prettier formatting
        run: |
          if npm run | grep -q "format:check"; then
            npm run format:check
          else
            echo "No format:check script found, skipping format check."
          fi

      - name: Run build
        run: npm run build
